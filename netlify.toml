[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # ─── Prisma : mode normal (pas Data Proxy) ───
  # Sans ces flags, Netlify (via l'extension Neon) génère un client en mode
  # Data Proxy qui exige une URL `prisma://...`. Ça casse la connexion à
  # Supabase qui est en `postgresql://...`. On force le mode "library".
  PRISMA_CLIENT_ENGINE_TYPE = "library"
  PRISMA_GENERATE_DATAPROXY = "false"
  PRISMA_GENERATE_NO_ENGINE = "false"
  # ─── Secret scanning ───
  # Ces variables ne sont pas des secrets : ce sont des contacts publics
  # (expéditeur d'emails, téléphone/email d'assistance) qui sont volontairement
  # intégrés dans les emails sortants et donc visibles dans le build output.
  SECRETS_SCAN_OMIT_KEYS = "EMAIL_FROM,ADMIN_CONTACT_EMAIL,ADMIN_CONTACT_PHONE,ADMIN_CONTACT_NAME"
  # On exclut aussi les fichiers de seed (script ponctuel) et .env.example
  # du scan : ils contiennent des placeholders et des emails de démo, pas de
  # vrais secrets.
  SECRETS_SCAN_OMIT_PATHS = ".env.example,prisma/seed.ts,prisma/update-admin.ts"
